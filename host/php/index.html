<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Event Timeline</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
        }
        #scroll-container {
            width: 100%;
            max-width: 950px;
            height: 90vh;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 24px;
        }
        .event-row { 
            padding: 15px; border-bottom: 1px solid #eee; 
            display: flex; justify-content: center; align-items: center;
            position: relative;
            gap: 10px;
            padding-left: 30px;
        }
        .date-text { color: #555; font-size: 0.9rem; font-weight: bold; }
        .status-badge { 
            padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; 
            text-transform: uppercase; background: #e0e0e0; 
        }
        .status-live { background: #ff4d4d; color: white; }
        .status-scheduled { background: #4da3ff; color: white; }
        .matchup {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
            transform: translateX(-130px);
        }
        .team-left {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: flex-end;
            flex: 1;
            min-width: 0;
        }
        .team-right {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: flex-start;
            flex: 1;
            min-width: 0;
        }
        .vs-text {
            width: 50px;
            text-align: center;
            flex-shrink: 0;
        }
        .round {
            left: 15px;
            top: 50%;
            background-color: #007bff;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .date-group-header {
            background: #f8f9fa;
            padding: 8px 15px;
            font-size: 0.85rem;
            color: #666;
            border-bottom: 2px solid #dee2e6;
            position: sticky;
            top: 0;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="scroll-container">
    <div id="event-list"></div>
    <div style="display:flex; justify-content:center; gap:10px; margin:18px 0;">
        <button id="prev-page" style="padding:8px 18px; font-size:1em; border-radius:4px; border:1px solid #bbb; background:#f8f9fa; cursor:pointer;">Prev</button>
        <span id="page-indicator" style="align-self:center; font-weight:bold;"></span>
        <button id="next-page" style="padding:8px 18px; font-size:1em; border-radius:4px; border:1px solid #bbb; background:#f8f9fa; cursor:pointer;">Next</button>
    </div>
</div>

<script>
    const list = document.getElementById('event-list');
    let loading = false;
    let currentPage = 1;

    fetch('api.php?get_initial_page=1')
        .then(resp => resp.json())
        .then(data => {
            if (data && data.initialPage) currentPage = data.initialPage;
            updatePageIndicator();
            loadEvents();
        })
        .catch(() => {
            updatePageIndicator();
            loadEvents();
        });

    async function loadEvents() {
        if (loading) return;
        loading = true;

        try {
            const response = await fetch(`api.php?page=${currentPage}`);
            const data = await response.json();

            list.innerHTML = '';
            if (data.length > 0) {
                const fragment = document.createDocumentFragment();
                let lastDateInBatch = null;

                data.forEach(event => {
                    const currentDate = event.start_datetime.split(' ')[0];
                    const currentTime = event.start_datetime.split(' ')[1].substring(0, 5);

                    if (currentDate !== lastDateInBatch) {
                        const dateHeader = document.createElement('div');
                        dateHeader.className = 'date-group-header';
                        dateHeader.innerHTML = `<strong>${currentDate}</strong>`;
                        fragment.appendChild(dateHeader);
                    }
                    lastDateInBatch = currentDate;

                    const roundDiv = document.createElement('div');
                    roundDiv.className = 'round';
                    roundDiv.textContent = event.season_label + ' - ' + event.round_name;
                    fragment.appendChild(roundDiv);

                    const row = document.createElement('div');
                    row.className = 'event-row';
                    row.style.cursor = 'pointer';
                    
                    row.addEventListener('click', function() {
                        sessionStorage.setItem('currentEvent', JSON.stringify(event));
                        window.location.href = 'event_detail.html';
                    });

                    const vsText = (event.score_first !== null && event.score_second !== null) 
                        ? `${event.score_first} - ${event.score_second}` 
                        : 'vs';

                    row.innerHTML = `
                        <span class="time-part">${currentTime}</span>
                        <div class="matchup">
                            <div class="team-left">
                                <span class="team-name">${event.team1_name}</span>
                                <img src="${event.team1_logo}" width="20px" height="auto" />
                            </div>
                            <span class="vs-text">${vsText}</span>
                            <div class="team-right">
                                <img src="${event.team2_logo}" width="20px" height="auto" />
                                <span class="team-name">${event.team2_name}</span>
                            </div>
                        </div>
                    `;

                    const rightContainer = document.createElement('div');
                    rightContainer.style.cssText = "display:flex; align-items:center; gap:8px; position:absolute; right:15px;";

                    const statusBadge = document.createElement('span');
                    statusBadge.className = `status-badge status-${event.status.toLowerCase()}`;
                    statusBadge.textContent = event.status;
                    rightContainer.appendChild(statusBadge);

                    row.appendChild(rightContainer);
                    fragment.appendChild(row);

                    if (event.description) {
                        const descRow = document.createElement('div');
                        descRow.className = 'event-row';
                        descRow.style.cssText = "background-color:#f9f9f9; font-style:italic; padding-left:50px;";
                        descRow.textContent = event.description;
                        fragment.appendChild(descRow);
                    }
                });
                list.appendChild(fragment);
            }
        } catch (err) {
            console.error(err);
        } finally {
            loading = false;
            updatePageIndicator();
        }
    }

    function updatePageIndicator() {
        document.getElementById('page-indicator').textContent = `Page ${currentPage}`;
    }

    document.getElementById('prev-page').addEventListener('click', () => {
        if (currentPage > 1) { 
            currentPage--; 
            loadEvents(); 
        }
    });

    document.getElementById('next-page').addEventListener('click', () => {
        currentPage++; 
        loadEvents();
    });
</script>

</body>
</html>
