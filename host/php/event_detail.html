<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #f4f4f9; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        .back-btn:hover {
            background: #0056b3;
        }
        .event-detail {
            margin-bottom: 20px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .detail-label {
            font-weight: bold;
            color: #333;
        }
        .detail-value {
            color: #666;
        }
        .teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            
        }
        .team {
            text-align: center;
            transform: translateY(-30px);
            flex: 1;
        }
        .team-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
        }
        .vs {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .status-live { 
            background: #ff4d4d; 
            color: white; 
        }
        .status-scheduled { 
            background: #4da3ff; 
            color: white; 
        }
        .description-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .description-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .description-text {
            color: #666;
            line-height: 1.6;
        }
        .venue-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .venue-text {
            color: #666;
            line-height: 1.3;
            font-size: 70%;
        }
        .venue-section {
            font-size: 2em;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
            color: #333;
        }
        
        .no-description {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Event Details</h1>
        <a href="index.html" class="back-btn">← Back</a>
    </div>

    <div id="event-content"></div>
</div>

<script>
    // Get event data from sessionStorage
    function getEventFromStorage() {
        try {
            const eventJSON = sessionStorage.getItem('currentEvent');
            return eventJSON ? JSON.parse(eventJSON) : null;
        } catch (e) {
            console.error('Error parsing event data:', e);
            return null;
        }
    }

    const event = getEventFromStorage();
    const content = document.getElementById('event-content');

    if (event) {
        const currentDate = event.start_datetime.split(' ')[0];
        const currentTime = event.start_datetime.split(' ')[1].substring(0, 5);
        const vsText = (event.score_first !== null && event.score_second !== null) 
            ? `${event.score_first} - ${event.score_second}` 
            : 'vs';

        // Team color backgrounds and established year
        const team1Bg = `background: linear-gradient(90deg, ${event.team1_primary_color || '#f9f9f9'}, ${event.team1_secondary_color || '#f9f9f9'});`;
        const team2Bg = `background: linear-gradient(90deg, ${event.team2_primary_color || '#f9f9f9'}, ${event.team2_secondary_color || '#f9f9f9'});`;

        let html = `
            <span class="status-badge status-${event.status.toLowerCase()}">
                ${event.status}
            </span>

            <div class="event-detail">
                <div class="detail-row">
                    <span class="detail-label">Date:</span>
                    <span class="detail-value">${currentDate}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Time:</span>
                    <span class="detail-value">${currentTime}</span>
                </div>
            </div>

            <div class="event-detail">
                <div class="detail-row">
                    <span class="detail-label">Season:</span>
                    <span class="detail-value">${event.season_label || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Round:</span>
                    <span class="detail-value">${event.round_name || 'N/A'}</span>
                </div>
            </div>

            <div class="teams">
                <div class="team" style="${team1Bg}">
                    <p id="home-checker"  style="display: block; font-weight: bold; font-size: 25px;">${event._first_team_id === event.venue_home_team_id ? 'HOME' : 'NEUTRAL'}</p>
                    <div class="team-logo">
                        <img src="${event.team1_logo}" alt="${event.team1_name}" style="width: 100%; height: 100%; object-fit: contain;" />
                    </div>
                    <span>${event.team1_name}</span><br>
                    <span style="font-size:0.95em; color: yellow;">Established: ${event.team1_established_year || 'N/A'}</span>
                </div>
                <div class="vs">${vsText}</div>
                <div class="team" style="${team2Bg}">
                    <p id="home-checker" style="display: block; font-weight: bold; font-size: 25px;">${event._first_team_id === event.venue_home_team_id ? 'AWAY' : 'NEUTRAL'}</p>
                    <div class="team-logo">
                        <img src="${event.team2_logo}" alt="${event.team2_name}" style="width: 100%; height: 100%; object-fit: contain;" />
                    </div>
                    <span>${event.team2_name}</span><br>
                    <span style="font-size:0.95em; color: yellow;">Established: ${event.team2_established_year || 'N/A'}</span>
                </div>
            </div>
        `;

       
        html += `
                <div class="venue-section">
                    <div class="venue-title">Venue:</div>
                    <div class="venue-text">${event.venue_name}, Capacity: ${event.venue_capacity}, ${event.venue_is_indoor ? 'Indoor' : 'Outdoor'}, City: ${event.venue_city_name || 'N/A'}, Country: ${event.venue_country_name || 'N/A'}</div>
                </div>
            `;
        if (event.description) {
            html += `
                <div class="description-section">
                    <div class="description-title">Description:</div>
                    <div class="description-text">${event.description}</div>
                </div>
            `;
        } else {
            html += `
                <div class="description-section">
                    <div class="description-text no-description">No description available.</div>
                </div>
            `;
        }

        content.innerHTML = html;
    } else {
        content.innerHTML = '<p>Error: Event data not found. Please go back and try again.</p>';
    }
</script>

</body>
</html>
