services:
  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./export_file.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_permanent_data:/var/lib/postgresql/data
    restart: always

  php:
    build: ./php 
    env_file:
      - .env
    volumes:
      - ./php:/var/www/html
    links:
      - db
    depends_on:
      - db

  web:
    image: nginx:latest
    ports:
      - "2137:2137"
    volumes:
      - ./php:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    links:
      - php
    depends_on:
      - php

volumes:
  db_permanent_data:
